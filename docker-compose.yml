services:
  database:
    image: postgres:15-alpine
    container_name: postgres_db
    networks:
      - api-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data 
    ports:
      - "5432:5432" # Gardez-le pour utiliser un client SQL sur votre PC, peut être supprimé en prod

  api:
    build: ./app_api
    container_name: api_backend
    networks:
      - front-api
      - api-db
    volumes:
      - ./app_api:/app
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000" # Utile pour tester l'API séparément
    depends_on:
      - database

  frontend:
    build: ./app_front
    container_name: streamlit_front
    networks:
      - front-api
    volumes:
      - ./app_front:/app
    environment:
      API_URL: ${API_URL}
    ports:
      - "8501:8501" # INDISPENSABLE pour voir Streamlit dans votre navigateur
    depends_on:
      - api

volumes:
  db_data: # Assurez-vous que ce nom est identique à celui utilisé dans 'database'

# Déclaration des réseaux
networks:
  front-api:
    driver: bridge
  api-db:
    driver: bridge