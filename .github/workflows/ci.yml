name: CI Quality Check
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          
      - name: Set up Python
        run: uv python install 3.12

      - name: Lint with Ruff
        # Si Ruff échoue ici, c'est que le formatage local (ton settings.json) 
        # n'a pas été appliqué avant le push.
        run: |
          uv run ruff check .
          uv run ruff format --check .


      - name: Run Tests with Pytest
        # On définit des variables d'env vides pour que dotenv ne bloque pas
        env:
          TESTING: True
          DATABASE_URL: "sqlite:///./test.db" 
          PYTHONPATH: .
        run: uv run pytest --cov=app_api --cov=app_front .  
